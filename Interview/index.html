<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview Center | CareerOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <script defer src="../assets/js/utils.js"></script>
    <script defer src="../assets/js/storage.js"></script>
    <script defer src="../assets/js/dashboard.js"></script>
    <script defer src="../assets/js/interview.js"></script>
    <script
      src="https://kit.fontawesome.com/6dcb0c1b0b.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="logo">
          <div class="logo-icon">
            <i class="fa-solid fa-comments"></i>
          </div>

          <div class="logo-text">
            <h2>CareerOS</h2>
            <p>Interview Center</p>
          </div>
        </div>

        <nav aria-label="Interview navigation">
          <ul>
            <li>
              <a href="../index.html#dashboard"
                ><i class="fa-solid fa-chart-line"></i>Dashboard</a
              >
            </li>
            <li>
              <a href="../index.html#learning"
                ><i class="fa-solid fa-graduation-cap"></i>Learning</a
              >
            </li>
            <li>
              <a class="active" href="index.html"
                ><i class="fa-solid fa-comments"></i>Interview</a
              >
            </li>
          </ul>
        </nav>

        <hr />

        <div class="sidebar-footer">CareerOS v1.1</div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1>Interview Center</h1>
            <p>Question bank, personal answers, and review mode</p>
          </div>
        </header>

        <section class="panel interview-center">
          <div class="interview-layout">
            <article class="interview-review">
              <h2>Review Mode</h2>
              <div data-review-card aria-live="polite"></div>
            </article>

            <article class="interview-editor">
              <h2>Question Bank</h2>

              <form class="interview-form" data-interview-form>
                <input type="hidden" name="interviewId" />

                <div class="interview-form-grid">
                  <div class="form-field interview-form-wide">
                    <label for="interview-question">Question</label>
                    <input id="interview-question" name="question" type="text" required />
                  </div>

                  <div class="form-field">
                    <label for="interview-category">Category</label>
                    <select id="interview-category" name="category" required>
                      <option value="Behavioral">Behavioral</option>
                      <option value="Technical">Technical</option>
                      <option value="Support">Support</option>
                      <option value="Situational">Situational</option>
                      <option value="Company">Company</option>
                      <option value="General">General</option>
                    </select>
                  </div>

                  <div class="form-field">
                    <label for="interview-difficulty">Difficulty</label>
                    <select id="interview-difficulty" name="difficulty" required>
                      <option value="Easy">Easy</option>
                      <option value="Medium">Medium</option>
                      <option value="Hard">Hard</option>
                    </select>
                  </div>

                  <div class="form-field">
                    <label for="interview-status">Status</label>
                    <select id="interview-status" name="status" required>
                      <option value="New">New</option>
                      <option value="Need Practice">Need Practice</option>
                      <option value="In Review">In Review</option>
                      <option value="Mastered">Mastered</option>
                    </select>
                  </div>

                  <div class="form-field interview-form-wide">
                    <label for="interview-answer">Model answer</label>
                    <textarea id="interview-answer" name="answer" rows="4"></textarea>
                  </div>

                  <div class="form-field interview-form-wide">
                    <label for="interview-personal-answer">Personal answer</label>
                    <textarea id="interview-personal-answer" name="personalAnswer" rows="4"></textarea>
                  </div>

                  <div class="form-field interview-form-wide">
                    <label for="interview-notes">Notes</label>
                    <textarea id="interview-notes" name="notes" rows="3"></textarea>
                  </div>

                  <div class="form-field">
                    <label for="interview-tags">Tags</label>
                    <input id="interview-tags" name="tags" type="text" placeholder="dns, support" />
                  </div>

                  <div class="form-field interview-form-source">
                    <label for="interview-source">Source</label>
                    <input id="interview-source" name="source" type="text" />
                  </div>
                </div>

                <div class="form-actions">
                  <button class="button" type="submit" data-interview-submit>
                    Add question
                  </button>
                  <button class="button button-secondary" type="button" data-interview-reset>
                    Clear
                  </button>
                </div>
              </form>

              <div class="interview-toolbar" aria-label="Interview filters">
                <div class="form-field">
                  <label for="interview-search">Search</label>
                  <input
                    id="interview-search"
                    data-interview-search
                    type="search"
                    placeholder="Question, answer, tag"
                  />
                </div>

                <div class="form-field">
                  <label for="interview-filter-category">Category</label>
                  <select id="interview-filter-category" data-interview-category-filter>
                    <option value="All">All categories</option>
                    <option value="Behavioral">Behavioral</option>
                    <option value="Technical">Technical</option>
                    <option value="Support">Support</option>
                    <option value="Situational">Situational</option>
                    <option value="Company">Company</option>
                    <option value="General">General</option>
                  </select>
                </div>

                <div class="form-field">
                  <label for="interview-filter-status">Status</label>
                  <select id="interview-filter-status" data-interview-status-filter>
                    <option value="All">All statuses</option>
                    <option value="New">New</option>
                    <option value="Need Practice">Need Practice</option>
                    <option value="In Review">In Review</option>
                    <option value="Mastered">Mastered</option>
                  </select>
                </div>

                <div class="form-field">
                  <label for="interview-sort">Sort</label>
                  <select id="interview-sort" data-interview-sort>
                    <option value="updated-desc">Recently updated</option>
                    <option value="question-asc">Question A-Z</option>
                    <option value="difficulty-asc">Difficulty</option>
                    <option value="reviewed-asc">Least reviewed</option>
                  </select>
                </div>
              </div>

              <div class="interview-list" data-interview-list aria-live="polite"></div>
            </article>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
